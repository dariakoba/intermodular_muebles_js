<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear director</title>

    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body>

<div class="container py-4">

    <h1 class="h3 mb-4">Nuevo director</h1>

    <!-- error global -->
    <div id="error" class="alert alert-danger d-none"></div>

    <form id="form-director">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">País</label>
            <input type="text" id="pais" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Imagen</label>
            <input type="file" id="imagen" class="form-control" accept="image/*">
        </div>

        <div class="mb-3">
            <img id="preview"
                 class="img-thumbnail d-none"
                 style="max-width:200px;">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                Crear
            </button>

            <a href="/admin/directores/index.html" class="btn btn-secondary">
                Cancelar
            </a>
        </div>

    </form>

</div>

<script type="module" src="/js/admin/directores/create.js"></script>

</body>
</html>
