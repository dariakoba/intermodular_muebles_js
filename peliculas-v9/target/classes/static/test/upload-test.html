<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de subida de imágenes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        select,
        input[type="file"],
        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        #preview {
            margin-top: 20px;
            max-width: 300px;
            display: none;
            border: 1px solid #ccc;
            padding: 4px;
        }

        #result {
            margin-top: 20px;
            padding: 12px;
            border: 1px solid #ccc;
            background: #f7f7f7;
            white-space: pre-wrap;
        }

        .error {
            color: #b00020;
        }

        .success {
            color: #0a7a2f;
        }
    </style>
</head>
<body>
    <h1>Prueba de subida de imágenes</h1>

    <form id="upload-form">
        <div class="form-group">
            <label for="folder">Contexto</label>
            <select id="folder" name="folder">
                <option value="peliculas">Películas</option>
                <option value="usuarios">Usuarios</option>
                <option value="directores">Directores</option>
            </select>
        </div>

        <div class="form-group">
            <label for="file">Imagen</label>
            <input type="file" id="file" name="file" accept="image/*">
        </div>

        <button type="submit">Subir imagen</button>
    </form>

    <img id="preview" alt="Vista previa">
    <div id="result"></div>

    <script type="module" src="/js/test/upload-test.js"></script>
</body>
</html>
