<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi cuenta - DNA</title>

    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/perfil.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>

<header class="topbar">
    <div class="logo">
        <img src="images/login/logo.png" alt="logo">
        <span>DNA</span>
    </div>

    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="productos.html">Catálogo</a>
        <a href="productos.html">Productos</a>
        <a href="contacto.html">Contacto</a>
    </nav>

    <div class="icons">
        <a href="carrito.html" style="text-decoration: none; color: inherit;">
            <span class="material-symbols-outlined">shopping_cart</span>
        </a>

        <div class="person-menu-wrapper">
            <span id="person-icon" class="material-symbols-outlined">person</span>
            <div class="person-menu" id="person-menu">
                </div>
        </div>
    </div>
</header>

<main class="perfil-container">

    <h1>Mi cuenta</h1>

    <div class="card">
        <div class="card-header">
            <h2>Datos personales</h2>
            <button id="btn-edit" class="btn-edit">
                <span class="material-symbols-outlined">edit</span> Editar
            </button>
        </div>

        <div id="perfil-info">
            <p><strong>Nombre:</strong> <span id="nombre"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Teléfono:</strong> <span id="telefono"></span></p>
            <p><strong>Dirección:</strong> <span id="direccion"></span></p>
        </div>

        <div id="perfil-form" style="display: none;">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="input-nombre">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="input-email">
            </div>
            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" id="input-telefono">
            </div>
            <div class="form-group">
                <label>Dirección:</label>
                <input type="text" id="input-direccion">
            </div>
            <div class="form-actions">
                <button id="btn-save" class="btn-save">Guardar cambios</button>
                <button id="btn-cancel" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Puntos acumulados</h2>
        <p id="puntos"></p>
    </div>

    <div class="card">
        <h2>Mis pedidos</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="pedidos-body">
                </tbody>
        </table>
    </div>

</main>

<script src="/js/menuUser.js"></script>
<script src="/js/perfil.js"></script>

</body>
</html>
