<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="container">
        <h1>Editar Producto</h1>
        <form id="form-producto">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input id="nombre" name="nombre" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Color</label>
                <input id="color" name="color" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Precio (€)</label>
                <input id="precio" name="precio" type="number" step="0.01" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Stock</label>
                <input id="stock" name="stock" type="number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select id="categoria" name="categoria" class="form-select"></select>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea id="descripcion" name="descripcion" class="form-control"></textarea>
            </div>

            <button class="btn btn-primary">Guardar</button>
            <a href="index.html" class="btn btn-secondary">Cancelar</a>

        </form>
    </div>
    <script type="module" src="js/edit.js"></script>
</body>
</html>
