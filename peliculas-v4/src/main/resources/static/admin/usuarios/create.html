<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Usuario</title>
<link rel="stylesheet" href="css/create.css">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>

<header class="topbar">
  <a href="home.html" class="logo">
    <img src="/images/logo.png" alt="Logo">
    DNA
  </a>

  <nav class="menu">
    <a href="../../adminhome.html">Home</a>
    <a href="index.html">Usuarios</a>
    <a href="../productos/index.html">Productos</a>
    <a href="#">Pedidos</a>
    <a href="#">Estadísticas</a>
  </nav>

  <div class="icons person-menu-wrapper">
    <span class="material-symbols-outlined">account_circle</span>
    <div class="person-menu">
      <a href="#">Perfil</a>
      <a href="#" id="logoutBtn">Salir</a>
    </div>
  </div>
</header>

<main class="create-container">
  <h1 class="title">Crear Usuario</h1>

  <form id="form-usuario" class="create-form">

    <input id="nombre" placeholder="Nombre" required>
    <input id="apellidos" placeholder="Apellidos" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="telefono" placeholder="Teléfono">
    <input id="direccion" placeholder="Dirección">

    <select id="rol">
      <option value="cliente">Cliente</option>
      <option value="admin">Admin</option>
    </select>

    <input id="password" type="password" placeholder="Contraseña" required>

    <div class="buttons">
      <button type="submit" class="btn-main">Guardar</button>
      <button type="button" onclick="window.location.href='index.html'" class="btn-cancel">Cancelar</button>
    </div>
  </form>
</main>

<script src="js/create.js"></script>
</body>
</html>
