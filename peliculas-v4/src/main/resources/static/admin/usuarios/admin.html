<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin Usuarios</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f2f2f2;
}

h1{
    margin-bottom:20px;
}

.form-box{
    background:white;
    padding:20px;
    margin-bottom:30px;
    border-radius:6px;
}

input,select{
    padding:8px;
    margin:5px;
}

button{
    padding:6px 10px;
    margin:3px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
}

th{
    background:#333;
    color:white;
}

</style>

</head>

<body>

<h1>Administración de Usuarios</h1>

<div class="form-box">

<h3 id="formTitle">Crear Usuario</h3>

<input type="hidden" id="userId">

<input id="nombre" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="email" placeholder="Email">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<select id="rol">
<option value="cliente">cliente</option>
<option value="empleado">empleado</option>
<option value="admin">admin</option>
</select>

<input id="passwordHash" placeholder="Password">

<br>

<button onclick="guardarUsuario()">Guardar</button> <button onclick="limpiarFormulario()">Cancelar</button>

</div>

<table id="tablaUsuarios">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Rol</th>
<th>Teléfono</th>
<th>Acciones</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

async function cargarUsuarios(){

    const response = await fetch("/api/admin/usuarios")
    const usuarios = await response.json()

    const tbody = document.querySelector("#tablaUsuarios tbody")
    tbody.innerHTML = ""

    usuarios.forEach(u => {

        const fila = `
        <tr>
            <td>${u.id}</td>
            <td>${u.nombre} ${u.apellidos}</td>
            <td>${u.email}</td>
            <td>${u.rol}</td>
            <td>${u.telefono ?? ""}</td>
            <td>
                <button onclick="editarUsuario(${u.id})">Editar</button>
                <button onclick="borrarUsuario(${u.id})">Borrar</button>
            </td>
        </tr>
        `

        tbody.innerHTML += fila

    })

}



async function guardarUsuario(){

    const id = document.getElementById("userId").value

    const password = document.getElementById("passwordHash").value

    const usuario = {
        rol: document.getElementById("rol").value,
        telefono: document.getElementById("telefono").value,
        estado: "activo",
        nombre: document.getElementById("nombre").value,
        apellidos: document.getElementById("apellidos").value,
        direccion: document.getElementById("direccion").value,
        email: document.getElementById("email").value,
        puntos: null,
        nivelAcceso: null,
        salario: null
    }

    // Solo añadir password si se ha escrito
    if(password && password.trim() !== ""){
        usuario.passwordHash = password
    }

    if(id){

        await fetch(`/api/admin/usuarios/${id}`,{
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(usuario)
        })

    }else{

        // En creación la password es obligatoria
        if(!usuario.passwordHash){
            alert("La contraseña es obligatoria")
            return
        }

        await fetch("/api/admin/usuarios",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(usuario)
        })

    }

    limpiarFormulario()
    cargarUsuarios()

}



async function borrarUsuario(id){

    const confirmar = confirm("¿Borrar usuario?")

    if(!confirmar) return

    await fetch(`/api/admin/usuarios/${id}`,{
        method:"DELETE"
    })

    cargarUsuarios()

}



async function editarUsuario(id){

    const response = await fetch(`/api/admin/usuarios/${id}`)
    const u = await response.json()

    document.getElementById("userId").value = u.id
    document.getElementById("nombre").value = u.nombre
    document.getElementById("apellidos").value = u.apellidos
    document.getElementById("email").value = u.email
    document.getElementById("telefono").value = u.telefono
    document.getElementById("direccion").value = u.direccion
    document.getElementById("rol").value = u.rol
    document.getElementById("passwordHash").value = ""

    document.getElementById("formTitle").innerText = "Editar Usuario"

}



function limpiarFormulario(){

    document.getElementById("userId").value = ""
    document.getElementById("nombre").value = ""
    document.getElementById("apellidos").value = ""
    document.getElementById("email").value = ""
    document.getElementById("telefono").value = ""
    document.getElementById("direccion").value = ""
    document.getElementById("passwordHash").value = ""

    document.getElementById("formTitle").innerText = "Crear Usuario"

}



cargarUsuarios()

</script>

</body>
</html>
