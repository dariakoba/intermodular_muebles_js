<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA - Mi Carrito</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/styleCarrito.css">
</head>
<body>

	<header class="topbar">

	    <div class="logo">
	        <img src="images/login/logo.png" alt="logo">
	        <span>DNA</span>
	    </div>

	    <nav class="menu">
	        <a href="index.html">Home</a>
	        <a href="productos.html">Catálogo</a>
	        <a href="productos.html">Productos</a>
	        <a href="contacto.html">Contacto</a>
	    </nav>

	    <div class="icons">

			<a href="carrito.html" class="icon-link">
			    <span class="material-symbols-outlined">shopping_cart</span>
			</a>
				

				<div class="person-menu-wrapper">
				    <span id="person-icon" class="material-symbols-outlined">person</span>

				    <div class="person-menu">
				        <a href="#">Ver cuenta</a>
				        <a href="#">Cerrar sesión</a>
				    </div>
				</div>
	        </div>

	    </div>
	

	</header>

   <main class="carrito-container">
    <h1>Tu Carrito</h1>
    
</main>
<div class="carrito-container">
    <div id="carrito-contenido" class="productos-lista">
        </div>

    <aside id="carrito-resumen" class="resumen-lateral">
        <h2 class="resumen-titulo">Resumen</h2>
        <div class="resumen-fila">
            <span>Subtotal</span>
            <span id="precio-total">0.00€</span>
        </div>
        <div class="resumen-fila">
            <span>Envío</span>
            <span class="gratis">Gratis</span>
        </div>
        <hr>
        <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
        <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar Carrito</button>
    </aside>
</div>
	<script src="js/carrito.js"></script>
	<script src="/js/menuUser.js"></script>

</body>
</html>
