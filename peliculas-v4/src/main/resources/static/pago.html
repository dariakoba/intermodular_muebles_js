<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago - DNA Muebles</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 40px; background: #f4f4f4; display: flex; justify-content: center; }
        .form-box { background: white; padding: 30px; border-radius: 8px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); text-align: center; }
        h1 { color: #333; margin-bottom: 10px; }
        .total-pago { font-size: 1.2rem; margin-bottom: 25px; padding: 10px; background: #e8f4fd; border-radius: 4px; color: rgb(128, 64, 0); font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .row { display: flex; gap: 10px; }
        button { background: rgb(159, 80, 0); color: white; padding: 14px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #333; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #mensaje-exito { display: none; padding: 20px; }
        .check-icon { font-size: 60px; color: #27ae60; margin-bottom: 15px; }
        .btn-volver { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #27ae60; color: white; text-decoration: none; border-radius: 4px; }
        #datos-tarjeta { transition: 0.3s; }
    </style>
</head>
<body>

    <div class="form-box">
        <div id="contenido-pago">
            <h1>Finalizar Pedido</h1>
            <div class="total-pago">
                Total a pagar: <strong id="monto-total">0.00€</strong>
            </div>

            <form id="form-tarjeta">
                <input type="text" id="nombre-titular" placeholder="Nombre completo" required>
                
                <select id="metodo-pago" onchange="cambiarMetodoPago()">
                    <option value="Tarjeta">Tarjeta de Crédito / Débito</option>
                    <option value="Transferencia">Transferencia Bancaria</option>
                </select>
                
                <div id="datos-tarjeta">
                    <input type="text" placeholder="Número de tarjeta (16 dígitos)" required id="input-tarjeta" oninput="formatearTarjeta(this)">
                    <div class="row">
                        <input type="text" placeholder="MM/AA" required id="input-fecha" oninput="formatearFecha(this)">
                        <input type="text" placeholder="CVV" required id="input-cvv" oninput="formatearCVV(this)">
                    </div>
                </div>

                <div id="datos-transferencia" style="display: none; background: #fdfbf6; padding: 15px; border: 1px dashed #ccc; margin-top: 10px; text-align: left; font-size: 13px; color: #555;">
                    <p>Por favor, transfiere el importe total a la siguiente cuenta:</p>
                    <p><strong>IBAN:</strong> ES91 1234 5678 9012 3456</p>
                    <p><em>El pedido no se enviará hasta que confirmemos el pago.</em></p>
                </div>

                <button type="submit" id="btn-pagar">CONFIRMAR PEDIDO</button>
            </form>
        </div>

        <div id="mensaje-exito">
            <div class="check-icon">✔</div>
            <h2>¡Pedido Registrado!</h2>
            <p id="texto-exito">Tu pago ha sido procesado correctamente.</p>
            <a href="index.html" class="btn-volver">Volver a la tienda</a>
        </div>
    </div>

    <script>
        function formatearTarjeta(input) {
            input.value = input.value.replace(/\D/g, '').substring(0, 16);
        }

        function formatearCVV(input) {
            input.value = input.value.replace(/\D/g, '').substring(0, 3);
        }

        function formatearFecha(input) {
            let valor = input.value.replace(/\D/g, '');
            
            valor = valor.substring(0, 4);

            if (valor.length > 2) {
                input.value = valor.substring(0, 2) + '/' + valor.substring(2, 4);
            } else {
                input.value = valor;
            }
        }

        function cambiarMetodoPago() {
            const metodo = document.getElementById('metodo-pago').value;
            const divTarjeta = document.getElementById('datos-tarjeta');
            const divTransfer = document.getElementById('datos-transferencia');
            
            if (metodo === 'Transferencia') {
                divTarjeta.style.display = 'none';
                divTransfer.style.display = 'block';
                document.getElementById('input-tarjeta').removeAttribute('required');
                document.getElementById('input-fecha').removeAttribute('required');
                document.getElementById('input-cvv').removeAttribute('required');
            } else {
                divTarjeta.style.display = 'block';
                divTransfer.style.display = 'none';
                document.getElementById('input-tarjeta').setAttribute('required', 'true');
                document.getElementById('input-fecha').setAttribute('required', 'true');
                document.getElementById('input-cvv').setAttribute('required', 'true');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];

            if (carrito.length === 0) {
                window.location.href = "carrito.html";
                return;
            }

            const totalVenta = carrito.reduce((acc, prod) => {
                const precio = parseFloat(prod.precio) || 0;
                const cantidad = parseInt(prod.cantidad) || 1;
                return acc + (precio * cantidad);
            }, 0);

            document.getElementById('monto-total').innerText = totalVenta.toFixed(2) + "€";

            const form = document.getElementById('form-tarjeta');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault(); 

                const btn = document.getElementById('btn-pagar');
                btn.innerText = "Procesando...";
                btn.disabled = true;

                const metodoElegido = document.getElementById('metodo-pago').value;
                const estadoSimulado = metodoElegido === 'Tarjeta' ? 'Pagado' : 'Pendiente de pago';

                const objetoPedido = {
                    fecha: new Date().toISOString().split('T')[0],
                    clienteNombre: document.getElementById('nombre-titular').value.trim(),
                    total: totalVenta,
                    metodoPago: metodoElegido, 
                    estadoPago: estadoSimulado, 
                    activo: 1
                };

                const listaProductos = carrito.map(item => ({
                    id_producto: item.id_producto || item.id,
                    cantidad: item.cantidad || 1,
                    precio: item.precio || 0
                }));

                try {
                    const respuesta = await fetch('/api/carrito/comprar', {
                        method: 'POST',
                        credentials: 'include', 
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Accept': 'application/json' 
                        },
                        body: JSON.stringify({ pedido: objetoPedido, productos: listaProductos }) 
                    });

                    if (respuesta.ok) {
                        localStorage.removeItem('carrito'); 
                        document.getElementById('contenido-pago').style.display = 'none';
                        
                        if(metodoElegido === 'Transferencia') {
                            document.getElementById('texto-exito').innerText = "Tu pedido está pendiente. Realiza la transferencia para que lo procesemos.";
                        }
                        
                        document.getElementById('mensaje-exito').style.display = 'block';
                    } else {
                        if (respuesta.status === 401) {
                            alert("Por favor, inicia sesión para poder comprar.");
                        } else {
                            alert("Error en el servidor al intentar registrar la compra.");
                        }
                        btn.innerText = "CONFIRMAR PEDIDO";
                        btn.disabled = false;
                    }
                } catch (error) {
                    alert("No se pudo conectar con el servidor. Revisa si Spring Boot está encendido.");
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
