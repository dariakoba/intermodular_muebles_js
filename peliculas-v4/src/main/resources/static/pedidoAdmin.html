<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DNA - Admin Pedidos</title>
    <style>
        body{ font-family: Arial, sans-serif; margin:40px; background:#f2f2f2; }
        h1{ margin-bottom:20px; }
        .table-container{ background:white; padding:20px; border-radius:6px; }
        table{ width:100%; border-collapse:collapse; background:white; }
        th,td{ padding:10px; border:1px solid #ddd; text-align: left; }
        th{ background:#333; color:white; }
    </style>
</head>
<body>
    <h1>Gestión de Pedidos</h1>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Método Pago</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-admin"></tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const res = await fetch('/api/carrito/admin/todos');
            const pedidos = await res.json();
            document.getElementById('tabla-admin').innerHTML = pedidos.map(p => `
                <tr>
                    <td>#${p.idPedido}</td>
                    <td>${p.fecha}</td>
                    <td>${p.clienteNombre}</td>
                    <td>${p.total.toFixed(2)}€</td>
                    <td>${p.metodoPago}</td>
                    <td><b>${p.estadoPago}</b></td>
                </tr>
            `).join('');
        });
    </script>
</body>
</html>
