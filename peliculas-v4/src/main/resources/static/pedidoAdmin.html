<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA - Administración de Pedidos</title>
    <link rel="stylesheet" href="../../../css/usuarios-admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET --- */
        *, *::before, *::after {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        /* --- BODY --- */
        body {
          font-family: 'Lato', sans-serif;
          background: #fdfbf6;
          color: #222;
          min-height: 100vh;
          padding-top: 64px; /* espacio para navbar fija */
        }

        /* --- HEADER / NAVBAR --- */
        .navbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 40px;
          height: 64px;
          background: linear-gradient(90deg, #1a1a1a, #2c2c2c);
          position: fixed; /* siempre arriba */
          top: 0;
          left: 0;
          right: 0;
          z-index: 100;
          box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* --- LOGO --- */
        .logo-link, .logo {
          display: flex;           
          align-items: center;     
          gap: 10px;               
          color: #fff;
          text-decoration: none;
          font-family: 'Playfair Display', serif;
          font-size: 1.6rem;
          font-weight: 700;
        }

        .logo-circle {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          overflow: hidden;
        }
        .logo-image {
          width: 100%;
          height: 100%;
          object-fit: contain;
        }

        /* --- NAV LINKS --- */
        .nav-links {
          display: flex;
          gap: 28px;
        }
        .nav-links a {
          color: #ddd;
          text-decoration: none;
          font-size: 0.9rem;
          letter-spacing: 1px;
          text-transform: uppercase;
          transition: all 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active {
          color: #1abc9c;
          transform: translateY(-2px);
        }

        /* --- ICONS --- */
        .nav-icons {
          display: flex;
          align-items: center;
          gap: 18px;
        }
        .nav-icons i {
          color: #fff;
          font-size: 20px;
          cursor: pointer;
          transition: all 0.3s ease;
        }
        .nav-icons i:hover { 
          color: #1abc9c; 
          transform: scale(1.2);
        }

        /* --- LOGOUT BUTTON --- */
        .btn-logout {
          background: #c0392b;
          color: #fff;
          border: none;
          border-radius: 6px;
          padding: 6px 12px;
          font-weight: 700;
          cursor: pointer;
          text-transform: uppercase;
          display: flex;
          align-items: center;
          gap: 6px;
          transition: all 0.3s ease;
        }
        .btn-logout:hover {
          background: #a93226;
          transform: translateY(-1px);
        }

        /* --- MAIN ADMIN CONTAINER --- */
        .admin-container {
          max-width: 1200px;
          margin: 48px auto;
          padding: 0 24px;
        }

        /* --- CARDS DASHBOARD (Oculto en pedidos pero mantenido por tu código) --- */
        .admin-cards {
          display: flex;
          gap: 24px;
          margin-top: 32px;
          flex-wrap: wrap;
        }

        .admin-card {
          background: #fff;
          border-radius: 12px;
          flex: 1 1 280px;
          padding: 24px;
          box-shadow: 0 6px 20px rgba(0,0,0,0.08);
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
          transition: transform 0.2s, box-shadow 0.2s;
        }

        .admin-card i { font-size: 2.4rem; color: #1abc9c; }
        .admin-card h2 { font-size: 1.4rem; font-weight: 700; color: #333; }
        .admin-card p { font-size: 0.95rem; color: #555; }

        .admin-card button {
          align-self: stretch;
          padding: 10px 16px;
          font-weight: 700;
          text-transform: uppercase;
          border-radius: 6px;
          border: none;
          background: #1abc9c;
          color: #fff;
          cursor: pointer;
          transition: all 0.3s ease;
        }
        .admin-card button:hover { background: #16a085; transform: translateY(-2px); }
        .admin-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.12); }

        /* --- ESTILOS ORIGINALES DE LA TABLA DE PEDIDOS --- */
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }
        .btn-sort { 
            padding: 8px 15px; 
            margin-right: 10px; 
            border-radius: 5px; 
            cursor: pointer; 
            border: 1px solid #ddd; 
            background: white; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .btn-sort:hover { background: #f0f0f0; border-color: #bbb; }
        .btn-main {
            padding: 8px 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            border: none; 
            background: #1abc9c; 
            color: white; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn-main:hover { background: #16a085; }
        .btn-cancel {
            background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .btn-cancel:hover { background: #c0392b; }
        
        .badge { padding: 5px 10px; border-radius: 15px; color: white; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-pagado { background-color: #2ecc71; }
        .status-pendiente { background-color: #e67e22; }
        .price-text { font-weight: bold; color: #2c3e50; }

        /* Estilos básicos para la tabla para asegurar que se vea bien con el nuevo fondo */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            font-weight: 700;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 992px) {
          .admin-cards { flex-direction: column; gap: 16px; }
          .navbar { flex-wrap: wrap; height: auto; padding: 12px 24px; }
          .nav-links { gap: 16px; margin-top: 8px; }
          .form-horizontal { flex-wrap: wrap; gap: 10px; }
          .btn-main { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="home.html" class="logo-link">
            <div class="logo-container">
                <div class="logo-circle">
                    <img src="/images/logo.png" alt="DNA Logo" class="logo-image">
                </div>
                <span class="brand-name">DNA</span>
            </div>
        </a>

        <nav class="nav-links">
            <a href="admin.html">Dashboard</a>
            <a href="usuarios.html">Usuarios</a>
            <a href="productos.html">Productos</a>
            <a href="pedidos.html" class="active">Pedidos</a>
            <a href="#">Estadísticas</a>
        </nav>

        <div class="nav-icons">
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-regular fa-user"></i>
            <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
        </div>
    </header>

    <main class="admin-container">
        <h1 class="title">Gestión de Pedidos</h1>

        <div class="form-horizontal" style="display: flex; justify-content: flex-start; margin-bottom: 20px;">
            <button class="btn-sort" onclick="ordenarPedidos('id')">
                <i class="fa-solid fa-sort-numeric-down"></i> Ordenar por ID
            </button>
            <button class="btn-sort" onclick="ordenarPedidos('fecha')">
                <i class="fa-solid fa-calendar-days"></i> Ordenar por Fecha
            </button>
            <button class="btn-main" onclick="cargarPedidos()" style="margin-left: auto;">
                <i class="fa-solid fa-rotate"></i> Actualizar
            </button>
        </div>

        <table id="tablaPedidos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Titular Tarjeta</th>
                    <th>Productos (Cant.)</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody-pedidos">
                </tbody>
        </table>
    </main>

    <script>
        let pedidosOriginales = [];

        async function cargarPedidos() {
            try {
                // Ruta de tu controller
                const res = await fetch('/api/carrito/admin/lista');
                if (!res.ok) throw new Error("Error al obtener datos");
                
                pedidosOriginales = await res.json();
                renderizar(pedidosOriginales);
            } catch (e) {
                console.error(e);
            }
        }

        function renderizar(lista) {
            const tbody = document.getElementById('tbody-pedidos');
            if (!tbody) return;

            // Si la base de datos está vacía, mostramos un mensaje
            if (lista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No hay pedidos registrados</td></tr>`;
                return;
            }

            tbody.innerHTML = lista.map(p => {
                const esPagado = (p.estadoPago || "").toLowerCase() === 'pagado';
                const statusClass = esPagado ? 'status-pagado' : 'status-pendiente';
                
                return `
                    <tr>
                        <td><strong>#${p.idPedido}</strong></td>
                        <td>${p.fecha ? new Date(p.fecha).toLocaleDateString() : '---'}</td>
                        <td>${p.clienteNombre || 'Usuario DNA'}</td>
                        <td>
                            <div style="max-width: 250px; white-space: normal; word-wrap: break-word; line-height: 1.4;">
                                <strong style="color:#e67e22">${p.nombreProducto || 'Mueble'}</strong>
                            </div>
                        </td>
                        <td class="price-text">${(p.total || 0).toFixed(2)}€</td>
                        <td>
                            <span class="badge ${statusClass}">${p.estadoPago || 'Pendiente'}</span>
                        </td>
                        <td>
                            <button onclick="eliminarPedido(${p.idPedido})" class="btn-cancel" style="padding: 6px 12px; font-size: 12px;">
                                <i class="fa-solid fa-trash"></i> Eliminar
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function ordenarPedidos(criterio) {
            let copia = [...pedidosOriginales];
            if (criterio === 'id') {
                copia.sort((a, b) => b.idPedido - a.idPedido);
            } else if (criterio === 'fecha') {
                copia.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            }
            renderizar(copia);
        }

        async function eliminarPedido(id) {
            if (!confirm(`¿Deseas eliminar permanentemente el pedido #${id}?`)) return;
            
            try {
                const res = await fetch(`/api/carrito/admin/eliminar/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    cargarPedidos();
                } else {
                    alert("Error al eliminar");
                }
            } catch (e) {
                alert("Error de conexión");
            }
        }

        // Carga inicial
        document.addEventListener('DOMContentLoaded', cargarPedidos);
    </script>
</body>
</html>
